# JustService API — example configuration
# Copy to config.yaml (in the same directory as the binary) and adjust values.
# All settings can also be overridden with environment variables using the
# JUSTSERVICE_ prefix, e.g. JUSTSERVICE_SERVER_PORT=9000.
# Environment variables take precedence over the config file.

# ──────────────────────────────────────────────
# HTTP server
# ──────────────────────────────────────────────
server:
  host: "0.0.0.0"   # interface to bind; use 127.0.0.1 for localhost-only
  port: 8080

# ──────────────────────────────────────────────
# PostgreSQL database
# ──────────────────────────────────────────────
database:
  dsn: "postgres://justservice:changeme@localhost:5432/justservice?sslmode=disable"
  max_open_conns: 25
  max_idle_conns: 10
  conn_max_lifetime: "5m"
  # Path passed to golang-migrate. "file://migrations" works when running the
  # binary from the apps/api directory.
  migrations_path: "file://migrations"

# ──────────────────────────────────────────────
# JWT tokens
# ──────────────────────────────────────────────
jwt:
  # REQUIRED — change before deploying to production (≥ 32 random characters)
  secret: "CHANGE_ME_use_a_long_random_secret_here_32chars"
  access_token_ttl: "15m"   # short-lived access tokens (Bearer)
  refresh_token_ttl: "168h"  # httpOnly cookie lifetime (7 days)

# ──────────────────────────────────────────────
# gRPC server (plugin registration)
# ──────────────────────────────────────────────
grpc:
  host: "0.0.0.0"
  port: 9090

# ──────────────────────────────────────────────
# Logging
# ──────────────────────────────────────────────
log:
  level: "info"     # debug | info | warn | error
  format: "json"    # json (production) | console (human-readable dev output)

# ──────────────────────────────────────────────
# OIDC
# ──────────────────────────────────────────────
oidc:
  # Public browser-facing base URL used to build /api/auth/oidc/... callback URLs.
  # When using the Next.js web app, this should be the web origin, e.g. http://localhost:3000.
  public_base_url: ""
  bootstrap_providers: []
  # Example:
  # bootstrap_providers:
  #   - name: "Keycloak"
  #     issuer_url: "https://sso.example.com/realms/justservice"
  #     client_id: "justservice"
  #     client_secret: "CHANGE_ME"
  #     scopes:
  #       - "offline_access"
  #     # Optional: sync application roles from the OIDC token.
  #     # roles_claim is a dot-separated path in the ID token that contains the
  #     # user's roles. Common values:
  #     #   "roles"                  — a top-level string array
  #     #   "realm_access.roles"     — Keycloak realm roles
  #     # Leave empty (or omit) to skip role syncing; users always get "user".
  #     roles_claim: "realm_access.roles"
  #     # role_mappings translates OIDC role names to application role names.
  #     # Unmapped roles are dropped. If empty, OIDC names are used as-is.
  #     role_mappings:
  #       justservice-admin: "admin"
  #       justservice-user: "user"
  #     enabled: true
