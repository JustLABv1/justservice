apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "justservice.fullname" . }}-api
  labels:
    {{- include "justservice.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      {{- $ctx := dict "component" "api" }}
      {{- include "justservice.selectorLabels" (merge . $ctx) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "justservice.labels" . | nindent 8 }}
        {{- include "justservice.selectorLabels" (merge . $ctx) | nindent 8 }}
    spec:
      containers:
        - name: api
          image: "{{ .Values.api.image.registry }}/{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: grpc
              containerPort: 9090
              protocol: TCP
          env:
            - name: JUSTSERVICE_DATABASE_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ include "justservice.fullname" . }}-secret
                  key: database-dsn
            - name: JUSTSERVICE_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "justservice.fullname" . }}-secret
                  key: jwt-secret
            - name: JUSTSERVICE_LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "justservice.fullname" . }}-config
                  key: log-level
            - name: JUSTSERVICE_LOG_FORMAT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "justservice.fullname" . }}-config
                  key: log-format
            {{- with .Values.api.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
