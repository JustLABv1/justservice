apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "justservice.fullname" . }}-api
  labels:
    {{- include "justservice.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "justservice.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "justservice.labels" . | nindent 8 }}
        app.kubernetes.io/name: {{ include "justservice.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: api
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: api
          image: "{{ include "justservice.image" (dict "root" . "image" .Values.api.image) }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: grpc
              containerPort: 9090
              protocol: TCP
          env:
            - name: JUSTSERVICE_DATABASE_DSN
              valueFrom:
                secretKeyRef:
                  {{- if .Values.database.existingSecret.name }}
                  name: {{ .Values.database.existingSecret.name }}
                  key: {{ .Values.database.existingSecret.key | quote }}
                  {{- else }}
                  name: {{ include "justservice.fullname" . }}-secret
                  key: database-dsn
                  {{- end }}
            - name: JUSTSERVICE_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  {{- if .Values.config.existingSecret.name }}
                  name: {{ .Values.config.existingSecret.name }}
                  key: {{ .Values.config.existingSecret.key | quote }}
                  {{- else }}
                  name: {{ include "justservice.fullname" . }}-secret
                  key: jwt-secret
                  {{- end }}
            - name: JUSTSERVICE_LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "justservice.fullname" . }}-config
                  key: log-level
            - name: JUSTSERVICE_LOG_FORMAT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "justservice.fullname" . }}-config
                  key: log-format
            - name: JUSTSERVICE_OIDC_PUBLIC_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "justservice.fullname" . }}-config
                  key: oidc-public-base-url
            - name: JUSTSERVICE_OIDC_BOOTSTRAP_PROVIDERS_JSON
              valueFrom:
                secretKeyRef:
                  {{- if .Values.config.oidc.existingProvidersSecret.name }}
                  name: {{ .Values.config.oidc.existingProvidersSecret.name }}
                  key: {{ .Values.config.oidc.existingProvidersSecret.key | quote }}
                  {{- else }}
                  name: {{ include "justservice.fullname" . }}-secret
                  key: oidc-bootstrap-providers.json
                  {{- end }}
            {{- with .Values.api.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          startupProbe:
            httpGet:
              path: /api/health
              port: http
            failureThreshold: 30
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
