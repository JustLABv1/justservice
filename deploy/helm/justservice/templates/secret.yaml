apiVersion: v1
kind: Secret
metadata:
  name: {{ include "justservice.fullname" . }}-secret
  labels:
    {{- include "justservice.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if not .Values.config.existingSecret.name }}
  jwt-secret: {{ required "config.jwtSecret is required when config.existingSecret.name is not set" .Values.config.jwtSecret | quote }}
  {{- end }}
  {{- if not (and (not .Values.postgresql.enabled) .Values.database.existingSecret.name) }}
  database-dsn: {{ include "justservice.databaseDsn" . | quote }}
  {{- end }}
  {{- if and .Values.postgresql.enabled (not .Values.postgresql.existingSecret.name) }}
  postgres-password: {{ .Values.postgresql.password | quote }}
  {{- end }}
  {{- if not .Values.config.oidc.existingProvidersSecret.name }}
  oidc-bootstrap-providers.json: {{ toJson .Values.config.oidc.providers | quote }}
  {{- end }}
