## Global image settings
## When using a private registry, set global.imageRegistry here.
nameOverride: ""
fullnameOverride: ""

global:
  imageRegistry: ""

imagePullSecrets: []
#  - name: ghcr-auth

# ---------- API ----------
api:
  image:
    registry: ghcr.io
    repository: justlabv1/justservice/api
    tag: ""
    pullPolicy: IfNotPresent
  replicaCount: 1
  service:
    type: ClusterIP
    httpPort: 8080
    grpcPort: 9090
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  # Extra environment variables
  extraEnv: []
  #  - name: JUSTSERVICE_LOG_LEVEL
  #    value: debug
  # Extra volumes and volume mounts (e.g. for mounting a custom CA certificate)
  extraVolumes: []
  #  - name: internal-ca
  #    configMap:
  #      name: internal-ca
  extraVolumeMounts: []
  #  - name: internal-ca
  #    mountPath: /etc/ssl/internal-ca
  #    readOnly: true

# ---------- Web ----------
web:
  image:
    registry: ghcr.io
    repository: justlabv1/justservice/web
    tag: ""
    pullPolicy: IfNotPresent
  replicaCount: 1
  service:
    type: ClusterIP
    port: 3000
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

# ---------- Plugins ----------
plugins:
  garage:
    enabled: false
    image:
      registry: ghcr.io
      repository: justlabv1/justservice/plugin-garage
      tag: ""
      pullPolicy: IfNotPresent
    replicaCount: 1
    grpcPort: 9003
    env:
      - name: GARAGE_ADMIN_URL
        value: http://garage-s3:3903
      - name: GARAGE_S3_ENDPOINT
        value: https://garage.example.com
    secretEnv: []
    # Example:
    # secretEnv:
    #   - name: GARAGE_ADMIN_TOKEN
    #     secretName: garage-plugin
    #     secretKey: admin-token
    # Extra environment variables injected into the plugin container.
    # To trust a custom/internal CA, set GARAGE_CA_DIR to the directory where
    # the secret is mounted. All files in the directory are loaded as CA certs
    # (key name in the secret does not matter).
    extraEnv: []
    #  - name: GARAGE_CA_DIR
    #    value: /var/run/secrets/internal-ca
    # Extra volumes and volume mounts (e.g. for mounting a custom CA certificate).
    extraVolumes: []
    #  - name: internal-ca
    #    secret:
    #      secretName: vault-root-ca
    extraVolumeMounts: []
    #  - name: internal-ca
    #    mountPath: /var/run/secrets/internal-ca
    #    readOnly: true
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 250m
        memory: 256Mi

# ---------- Ingress ----------
ingress:
  enabled: true
  className: nginx
  annotations: {}
  #   cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: justservice.example.com
      paths:
        - path: /api
          pathType: Prefix
          service: api
        - path: /
          pathType: Prefix
          service: web
  tls: []
  #  - secretName: justservice-tls
  #    hosts:
  #      - justservice.example.com

# ---------- Configuration ----------
config:
  # Production setup: reference a pre-existing K8s Secret instead of putting
  # the JWT signing secret in values. When existingSecret.name is set,
  # config.jwtSecret below is ignored and no jwt-secret key is written to the
  # chart-managed Secret.
  #
  # Example:
  #   kubectl create secret generic justservice-jwt \
  #     --from-literal=jwt-secret=$(openssl rand -base64 48)
  existingSecret:
    name: ""
    key: jwt-secret

  # REQUIRED when config.existingSecret.name is empty — change before deploying.
  # Minimum 32 characters recommended for production.
  jwtSecret: ""

  logLevel: info
  logFormat: json
  oidc:
    # Public browser-facing base URL used to build OIDC callback URLs.
    # In Kubernetes this should usually match the web ingress origin.
    publicBaseUrl: ""

    # Preferred production setup: point the API at an existing Secret that contains
    # the full OIDC bootstrap JSON payload under the key below.
    existingProvidersSecret:
      name: ""
      key: oidc-bootstrap-providers.json

    # Optional inline provider bootstrap for local/dev use. Avoid committing
    # client secrets here; use existingProvidersSecret instead.
    providers: []
    # Example (with role sync):
    # providers:
    #   - name: Keycloak
    #     issuer_url: https://sso.example.com/realms/justservice
    #     client_id: justservice
    #     client_secret: change-me
    #     scopes:
    #       - offline_access
    #     # Optional: dot-separated path in the ID token that holds the user's
    #     # roles. Common values:
    #     #   roles                — top-level string array
    #     #   realm_access.roles   — Keycloak realm roles
    #     # Omit or leave empty to skip role syncing (users always get "user").
    #     roles_claim: realm_access.roles
    #     # Optional: map OIDC role names → application role names.
    #     # Unmapped roles are dropped. If omitted, OIDC names are used as-is.
    #     role_mappings:
    #       justservice-admin: admin
    #       justservice-user: user
    #     enabled: true
    # Example external secret (JSON array, same fields apply):
    # kubectl create secret generic justservice-oidc \
    #   --from-literal=oidc-bootstrap-providers.json='[{
    #     "name":"Keycloak",
    #     "issuer_url":"https://sso.example.com/realms/justservice",
    #     "client_id":"justservice",
    #     "client_secret":"...",
    #     "scopes":["offline_access"],
    #     "roles_claim":"realm_access.roles",
    #     "role_mappings":{"justservice-admin":"admin","justservice-user":"user"},
    #     "enabled":true
    #   }]'

# ---------- Database ----------
# Only required when postgresql.enabled = false.
# When postgresql.enabled = true the DSN is built automatically from the
# postgresql.* values below — no database.* configuration is needed.
database:
  # Full PostgreSQL DSN for an external database.
  dsn: ""

  # Reference a pre-existing K8s Secret containing the full DSN.
  # When set, database.dsn above is ignored.
  #
  # Example:
  #   kubectl create secret generic justservice-db \
  #     --from-literal=database-dsn='postgres://user:pass@host:5432/db?sslmode=require'
  existingSecret:
    name: ""
    key: database-dsn

# ---------- Bundled PostgreSQL ----------
# Suitable for development and single-node setups.
# When enabled, the database DSN is constructed automatically from the values
# below and stored in the chart-managed Secret — no database.* config needed.
# For production: set enabled: false and configure database.dsn or database.existingSecret.
postgresql:
  enabled: true
  username: justservice
  # Password for the PostgreSQL user. Used when existingSecret.name is empty.
  password: justservice

  # Reference a pre-existing Secret for the PostgreSQL password.
  # When set, postgresql.password above is ignored by the StatefulSet.
  # Because Helm cannot read Secret values, you must ALSO set
  # database.existingSecret so the DSN can be supplied externally.
  #
  # Example — one Secret, two keys:
  #   kubectl create secret generic justservice-pg \
  #     --from-literal=postgres-password=mypass \
  #     --from-literal=database-dsn='postgres://justservice:mypass@<release>-justservice-postgresql:5432/justservice?sslmode=disable'
  #
  # Then set:
  #   postgresql.existingSecret.name: justservice-pg
  #   database.existingSecret.name:   justservice-pg
  existingSecret:
    name: ""
    key: postgres-password

  database: justservice
  storage: 10Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 999
    fsGroup: 999
  containerSecurityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop: ["ALL"]

# ---------- Pod security ----------
# Applied to the API, web, and plugin pods.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65534
  fsGroup: 65534

containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]
