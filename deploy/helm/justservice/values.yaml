## Global image settings
## When using a private registry, set global.imageRegistry here.
nameOverride: ""
fullnameOverride: ""

global:
  imageRegistry: ""

imagePullSecrets: []
#  - name: ghcr-auth

# ---------- API ----------
api:
  image:
    registry: ghcr.io
    repository: justlabv1/justservice/api
    tag: ""
    pullPolicy: IfNotPresent
  replicaCount: 1
  service:
    type: ClusterIP
    httpPort: 8080
    grpcPort: 9090
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  # Extra environment variables
  extraEnv: []
  #  - name: JUSTSERVICE_LOG_LEVEL
  #    value: debug

# ---------- Web ----------
web:
  image:
    registry: ghcr.io
    repository: justlabv1/justservice/web
    tag: ""
    pullPolicy: IfNotPresent
  replicaCount: 1
  service:
    type: ClusterIP
    port: 3000
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

# ---------- Plugins ----------
plugins:
  garage:
    enabled: false
    image:
      registry: ghcr.io
      repository: justlabv1/justservice/plugin-garage
      tag: ""
      pullPolicy: IfNotPresent
    replicaCount: 1
    grpcPort: 9003
    env:
      - name: GARAGE_ADMIN_URL
        value: http://garage-s3:3903
      - name: GARAGE_S3_ENDPOINT
        value: https://garage.example.com
    secretEnv: []
    # Example:
    # secretEnv:
    #   - name: GARAGE_ADMIN_TOKEN
    #     secretName: garage-plugin
    #     secretKey: admin-token
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 250m
        memory: 256Mi

# ---------- Ingress ----------
ingress:
  enabled: true
  className: nginx
  annotations: {}
  #   cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: justservice.example.com
      paths:
        - path: /api
          pathType: Prefix
          service: api
        - path: /
          pathType: Prefix
          service: web
  tls: []
  #  - secretName: justservice-tls
  #    hosts:
  #      - justservice.example.com

# ---------- Configuration ----------
config:
  # Production setup: reference a pre-existing K8s Secret instead of putting
  # the JWT signing secret in values. When existingSecret.name is set,
  # config.jwtSecret below is ignored and no jwt-secret key is written to the
  # chart-managed Secret.
  #
  # Example:
  #   kubectl create secret generic justservice-jwt \
  #     --from-literal=jwt-secret=$(openssl rand -base64 48)
  existingSecret:
    name: ""
    key: jwt-secret

  # REQUIRED when config.existingSecret.name is empty — change before deploying.
  # Minimum 32 characters recommended for production.
  jwtSecret: ""

  logLevel: info
  logFormat: json
  oidc:
    # Public browser-facing base URL used to build OIDC callback URLs.
    # In Kubernetes this should usually match the web ingress origin.
    publicBaseUrl: ""

    # Preferred production setup: point the API at an existing Secret that contains
    # the full OIDC bootstrap JSON payload under the key below.
    existingProvidersSecret:
      name: ""
      key: oidc-bootstrap-providers.json

    # Optional inline provider bootstrap for local/dev use. Avoid committing
    # client secrets here; use existingProvidersSecret instead.
    providers: []
    # Example:
    # providers:
    #   - name: Keycloak
    #     issuer_url: https://sso.example.com/realms/justservice
    #     client_id: justservice
    #     client_secret: change-me
    #     scopes:
    #       - offline_access
    #     enabled: true
    # Example external secret:
    # kubectl create secret generic justservice-oidc \
    #   --from-literal=oidc-bootstrap-providers.json='[{"name":"Keycloak","issuer_url":"https://sso.example.com/realms/justservice","client_id":"justservice","client_secret":"...","scopes":["offline_access"],"enabled":true}]'

# ---------- Database ----------
database:
  # Full PostgreSQL DSN. Required when postgresql.enabled = false and
  # database.existingSecret.name is not set.
  dsn: ""

  # Reference a pre-existing K8s Secret that contains the full database DSN.
  # When set, database.dsn above is ignored.
  #
  # Example:
  #   kubectl create secret generic justservice-db \
  #     --from-literal=database-dsn='postgres://user:pass@host:5432/db?sslmode=require'
  existingSecret:
    name: ""
    key: database-dsn

# ---------- Bundled PostgreSQL ----------
# Suitable for development and single-node setups.
# For production: set enabled: false and supply database.dsn or database.existingSecret.
postgresql:
  enabled: true
  username: justservice
  # Password used when existingSecret.name is empty.
  # NOTE: this value is also used to construct the database DSN stored in the
  # chart-managed Secret. If you use existingSecret for the postgres container,
  # also set database.existingSecret with the full DSN so the password does not
  # appear in values at all.
  password: justservice

  # Reference a pre-existing K8s Secret for POSTGRES_PASSWORD in the StatefulSet.
  # When set, postgresql.password above is still used to build the database DSN
  # (stored in the chart-managed Secret) unless database.existingSecret is also set.
  existingSecret:
    name: ""
    key: postgres-password

  database: justservice
  storage: 10Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 999
    fsGroup: 999
  containerSecurityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop: ["ALL"]

# ---------- Pod security ----------
# Applied to the API, web, and plugin pods.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65534
  fsGroup: 65534

containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]
