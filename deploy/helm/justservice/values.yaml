## Global image settings
## When using a private registry, set global.imageRegistry here.
nameOverride: ""
fullnameOverride: ""

global:
  imageRegistry: ""

imagePullSecrets: []
#  - name: ghcr-auth

# ---------- API ----------
api:
  image:
    registry: ghcr.io
    repository: justlab/justservice/api
    tag: ""
    pullPolicy: IfNotPresent
  replicaCount: 1
  service:
    type: ClusterIP
    httpPort: 8080
    grpcPort: 9090
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  # Extra environment variables
  extraEnv: []
  #  - name: JUSTSERVICE_LOG_LEVEL
  #    value: debug

# ---------- Web ----------
web:
  image:
    registry: ghcr.io
    repository: justlab/justservice/web
    tag: ""
    pullPolicy: IfNotPresent
  replicaCount: 1
  service:
    type: ClusterIP
    port: 3000
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  # Must match the NEXT_PUBLIC_API_URL used when building the web image.
  # The same value is also exposed to the runtime auth proxy routes.
  apiUrl: "https://api.justservice.example.com"

# ---------- Plugins ----------
plugins:
  hello-world:
    enabled: true
    image:
      registry: ghcr.io
      repository: justlab/justservice/plugin-hello-world
      tag: ""
      pullPolicy: IfNotPresent
    replicaCount: 1
    grpcPort: 9001
    env: []
    secretEnv: []
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi
  webhook:
    enabled: true
    image:
      registry: ghcr.io
      repository: justlab/justservice/plugin-webhook
      tag: ""
      pullPolicy: IfNotPresent
    replicaCount: 1
    grpcPort: 9002
    env: []
    secretEnv: []
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi
  garage:
    enabled: false
    image:
      registry: ghcr.io
      repository: justlab/justservice/plugin-garage
      tag: ""
      pullPolicy: IfNotPresent
    replicaCount: 1
    grpcPort: 9003
    env:
      - name: GARAGE_ADMIN_URL
        value: http://garage-s3:3903
    secretEnv: []
    # Example:
    # secretEnv:
    #   - name: GARAGE_ADMIN_TOKEN
    #     secretName: garage-plugin
    #     secretKey: admin-token
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 250m
        memory: 256Mi

# ---------- Ingress ----------
ingress:
  enabled: true
  className: nginx
  annotations: {}
  #   cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: justservice.example.com
      paths:
        - path: /api
          pathType: Prefix
          service: api
        - path: /
          pathType: Prefix
          service: web
  tls: []
  #  - secretName: justservice-tls
  #    hosts:
  #      - justservice.example.com

# ---------- Configuration ----------
config:
  # REQUIRED — change before deploying
  jwtSecret: ""
  logLevel: info
  logFormat: json

# ---------- Database ----------
database:
  # Full PostgreSQL DSN. Required when postgresql.enabled = false.
  dsn: ""

# ---------- Bundled PostgreSQL ----------
# Set enabled: false and provide database.dsn for production deployments.
postgresql:
  enabled: true
  username: justservice
  password: justservice
  database: justservice
  storage: 10Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
